---
version: 2

project_name: endoflife_exporter

before:
  hooks:
    - go mod tidy
    - go fmt ./...

builds:
  - id: endoflife_exporter
    main: main.go
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - "-X github.com/veerendra2/gopackages/version.Version={{.Version}}"
      - "-X github.com/veerendra2/gopackages/version.Revision={{.ShortCommit}}"
      - "-X github.com/veerendra2/gopackages/version.Branch={{.Branch}}"
      - '-X github.com/veerendra2/gopackages/version.BuildUser={{envOrDefault "USER" "ci"}}'
      - "-X github.com/veerendra2/gopackages/version.BuildDate={{.Date}}"
    mod_timestamp: "{{ .CommitTimestamp }}"

kos:
  - id: distroless-image
    build: binaries
    repositories:
      - ghcr.io/veerendra2/endoflife_exporter
    tags:
      - "{{.Version}}"
      - latest
    bare: true
    preserve_import_paths: false
    platforms:
      - linux/amd64
      - linux/arm64
    base_image: gcr.io/distroless/static:nonroot

archives:
  - formats: ["zip"]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

checksum:
  name_template: "checksums.txt"
